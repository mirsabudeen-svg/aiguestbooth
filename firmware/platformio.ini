[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Use the N8R8 module (8 MB flash + 8 MB PSRAM) for long recordings.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.filesystem = littlefs

lib_deps =
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -DBOOTH_SAMPLE_RATE=16000
    -DBOOTH_MAX_RECORD_SECONDS=120

upload_speed = 921600
