# Render Blueprint — X-Audio Guest Booth (free tier, no payment required)
# https://render.com/docs/free
#
# Free limits: web services spin down after 15 min idle; Postgres expires after 30 days;
# no workers/cron/disks on free. Uploads use ephemeral disk (lost on redeploy).

services:
  - type: web
    name: aiguestbooth-api
    runtime: docker
    plan: free
    region: oregon
    branch: master
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiguestbooth-db
          property: connectionString
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_PATH
        value: /app/storage
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: FRONTEND_PUBLIC_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_PIPELINE_ENABLED
        value: "true"
      - key: FIRMWARE_LATEST_VERSION
        value: "0.2.0"

  - type: web
    name: aiguestbooth-dashboard
    runtime: node
    plan: free
    region: oregon
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: aiguestbooth-db
    plan: free
    region: oregon
    databaseName: aiguestbooth
    user: booth
